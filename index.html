<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interclasses Digital</title>
    <link rel="stylesheet" href="styles.css">
    <script src="front.js"></script>
</head>
<body>
    <nav>
        <h1>🎮 Interclasses</h1>
        <div class="menu">
            <button onclick="mudarAba('aba-competidores')">Competidores</button>
            <button onclick="mudarAba('aba-times')">Times</button>
            <button onclick="mudarAba('aba-jogos')">Jogos</button>
            <button onclick="mudarAba('aba-confrontos')">Confrontos</button>
        </div>
    </nav>

    <main>
        <section id="aba-competidores" class="aba ativa">
            <h2>Cadastrar Competidor</h2>
            <form id="form-competidor">
                <input type="text" id="nome-competidor" placeholder="Nome do Jogador" required>
                <button type="submit">Salvar</button>
            </form>
            <ul id="lista-competidores"></ul>
        </section>

        <section id="aba-times" class="aba">
            <h2>Cadastrar Time</h2>
            <form id="form-time">
                <input type="text" id="nome-time" placeholder="Nome do Time" required>
                <button type="submit">Salvar</button>
            </form>
            <ul id="lista-times"></ul>
        </section>

        <section id="aba-jogos" class="aba">
            <h2>Cadastrar Jogo</h2>
            <form id="form-jogo">
                <input type="text" id="nome-jogo" placeholder="Nome do Jogo (Ex: CS2)" required>
                <button type="submit">Salvar</button>
            </form>
            <ul id="lista-jogos"></ul>
        </section>

        <section id="aba-confrontos" class="aba">
            <h2>Registrar Partida</h2>
            <form id="form-confronto">
                <select id="select-time1" required></select>
                <span class="vs">VS</span>
                <select id="select-time2" required></select>
                <select id="select-jogo" required></select>
                <input type="text" id="placar" placeholder="Placar (Ex: 3 x 0)" required>
                <button type="submit">Registrar</button>
            </form>
            <div id="lista-confrontos" class="grid-confrontos"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
